
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); background: transparent; }
.app { min-height: 600px; background: var(--color-background-tertiary); }
.navbar { background: #185FA5; color: white; padding: 0 1.5rem; display: flex; align-items: center; justify-content: space-between; height: 52px; }
.navbar-brand { font-size: 16px; font-weight: 500; color: white; display: flex; align-items: center; gap: 8px; }
.navbar-right { display: flex; align-items: center; gap: 12px; font-size: 13px; }
.nav-badge { background: rgba(255,255,255,0.2); padding: 3px 10px; border-radius: 20px; font-size: 12px; }
.btn-logout { background: rgba(255,255,255,0.15); border: 0.5px solid rgba(255,255,255,0.3); color: white; padding: 5px 12px; border-radius: var(--border-radius-md); font-size: 12px; cursor: pointer; }
.btn-logout:hover { background: rgba(255,255,255,0.25); }
.page { padding: 1.5rem; }
.hidden { display: none !important; }

/* Login */
.login-wrap { min-height: 600px; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #E6F1FB 0%, #f0f6ff 100%); }
.login-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 2rem; width: 360px; }
.login-logo { text-align: center; margin-bottom: 1.5rem; }
.login-logo .icon-wrap { width: 56px; height: 56px; background: #E6F1FB; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 8px; }
.login-logo .icon-wrap i { font-size: 28px; color: #185FA5; }
.login-logo h2 { font-size: 18px; font-weight: 500; color: var(--color-text-primary); }
.login-logo p { font-size: 13px; color: var(--color-text-secondary); }
.form-group { margin-bottom: 1rem; }
.form-group label { display: block; font-size: 13px; color: var(--color-text-secondary); margin-bottom: 4px; }
.form-group input, .form-group select { width: 100%; padding: 8px 12px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); font-size: 14px; background: var(--color-background-primary); color: var(--color-text-primary); }
.btn-primary { width: 100%; padding: 10px; background: #185FA5; color: white; border: none; border-radius: var(--border-radius-md); font-size: 14px; font-weight: 500; cursor: pointer; }
.btn-primary:hover { background: #0C447C; }
.btn-secondary { padding: 7px 14px; background: var(--color-background-secondary); color: var(--color-text-primary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); font-size: 13px; cursor: pointer; }
.btn-secondary:hover { background: var(--color-background-tertiary); }
.btn-danger { padding: 7px 14px; background: #FCEBEB; color: #A32D2D; border: 0.5px solid #F7C1C1; border-radius: var(--border-radius-md); font-size: 13px; cursor: pointer; }
.btn-success { padding: 7px 14px; background: #EAF3DE; color: #3B6D11; border: 0.5px solid #C0DD97; border-radius: var(--border-radius-md); font-size: 13px; cursor: pointer; }
.btn-blue { padding: 7px 14px; background: #185FA5; color: white; border: none; border-radius: var(--border-radius-md); font-size: 13px; cursor: pointer; }
.btn-blue:hover { background: #0C447C; }
.error-msg { background: #FCEBEB; color: #A32D2D; border: 0.5px solid #F7C1C1; border-radius: var(--border-radius-md); padding: 8px 12px; font-size: 13px; margin-top: 8px; }
.success-msg { background: #EAF3DE; color: #3B6D11; border: 0.5px solid #C0DD97; border-radius: var(--border-radius-md); padding: 8px 12px; font-size: 13px; margin-top: 8px; }

/* Sidebar + layout */
.main-layout { display: flex; min-height: 548px; }
.sidebar { width: 220px; background: var(--color-background-primary); border-right: 0.5px solid var(--color-border-tertiary); padding: 1rem 0; flex-shrink: 0; }
.sidebar-section { font-size: 11px; font-weight: 500; color: var(--color-text-tertiary); padding: 8px 1rem 4px; text-transform: uppercase; letter-spacing: 0.5px; }
.sidebar-item { display: flex; align-items: center; gap: 10px; padding: 9px 1rem; font-size: 13px; color: var(--color-text-secondary); cursor: pointer; border-left: 3px solid transparent; }
.sidebar-item:hover { background: var(--color-background-secondary); color: var(--color-text-primary); }
.sidebar-item.active { background: #E6F1FB; color: #185FA5; border-left-color: #185FA5; font-weight: 500; }
.sidebar-item i { font-size: 17px; }
.content-area { flex: 1; padding: 1.5rem; overflow-y: auto; }

/* Cards */
.card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.25rem; margin-bottom: 1rem; }
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
.card-title { font-size: 15px; font-weight: 500; color: var(--color-text-primary); }
.page-title { font-size: 18px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 1.25rem; }

/* Table */
.tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
.tbl th { text-align: left; padding: 8px 12px; border-bottom: 0.5px solid var(--color-border-tertiary); color: var(--color-text-secondary); font-weight: 500; background: var(--color-background-secondary); }
.tbl td { padding: 9px 12px; border-bottom: 0.5px solid var(--color-border-tertiary); color: var(--color-text-primary); }
.tbl tr:hover td { background: var(--color-background-secondary); }
.badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }
.badge-blue { background: #E6F1FB; color: #0C447C; }
.badge-green { background: #EAF3DE; color: #27500A; }
.badge-amber { background: #FAEEDA; color: #633806; }
.badge-red { background: #FCEBEB; color: #791F1F; }
.badge-gray { background: var(--color-background-secondary); color: var(--color-text-secondary); }

/* Modal overlay */
.modal-bg { position: relative; min-height: 400px; background: rgba(0,0,0,0.4); border-radius: var(--border-radius-lg); display: flex; align-items: center; justify-content: center; padding: 1rem; }
.modal-box { background: var(--color-background-primary); border-radius: var(--border-radius-lg); padding: 1.5rem; width: 100%; max-width: 420px; border: 0.5px solid var(--color-border-tertiary); }
.modal-title { font-size: 15px; font-weight: 500; margin-bottom: 1rem; color: var(--color-text-primary); }

/* Dashboard metrics */
.metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-bottom: 1.25rem; }
.metric { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 1rem; }
.metric-label { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px; }
.metric-value { font-size: 22px; font-weight: 500; color: var(--color-text-primary); }

/* Steps */
.step-indicator { display: flex; align-items: center; gap: 0; margin-bottom: 1.5rem; }
.step { display: flex; align-items: center; gap: 6px; font-size: 12px; }
.step-num { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; }
.step.done .step-num { background: #185FA5; color: white; }
.step.active .step-num { background: #E6F1FB; color: #185FA5; border: 1.5px solid #185FA5; }
.step.pending .step-num { background: var(--color-background-secondary); color: var(--color-text-tertiary); }
.step-line { width: 24px; height: 1px; background: var(--color-border-tertiary); margin: 0 2px; }

/* Face scanner */
.face-scanner { width: 160px; height: 160px; border-radius: 50%; border: 3px solid #185FA5; margin: 1rem auto; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; background: #E6F1FB; }
.scan-line { width: 100%; height: 2px; background: rgba(24,95,165,0.6); position: absolute; animation: scan 2s linear infinite; }
@keyframes scan { 0%{top:10%} 100%{top:90%} }

/* Exam take area */
.question-nav { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1rem; }
.q-btn { width: 32px; height: 32px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); font-size: 12px; cursor: pointer; background: var(--color-background-primary); color: var(--color-text-primary); }
.q-btn.answered { background: #EAF3DE; color: #27500A; border-color: #C0DD97; }
.q-btn.current { background: #185FA5; color: white; border-color: #185FA5; }

input[type="radio"] { margin-right: 6px; }
.option-row { display: flex; align-items: center; padding: 8px 12px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); margin-bottom: 6px; cursor: pointer; font-size: 14px; }
.option-row:hover { background: var(--color-background-secondary); }
.option-row.selected { background: #E6F1FB; border-color: #85B7EB; color: #0C447C; }
</style>

<div class="app" id="app">

<!-- LOGIN -->
<div id="pg-login">
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <div class="icon-wrap"><i class="ti ti-school" aria-hidden="true"></i></div>
        <h2>ExamSys</h2>
        <p>Online Exam Management System</p>
      </div>
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="login-user" placeholder="Enter username" value="lecturer1" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-pass" placeholder="Enter password" value="pass123" />
      </div>
      <div class="form-group">
        <label>Role</label>
        <select id="login-role">
          <option value="lecturer">Lecturer</option>
          <option value="student">Student</option>
          <option value="academic">Academic Affairs</option>
        </select>
      </div>
      <div id="login-error" class="error-msg hidden"><i class="ti ti-alert-circle" aria-hidden="true"></i> Invalid credentials. Please try again.</div>
      <div style="display:flex; gap:8px; margin-top:1rem;">
        <button class="btn-primary" onclick="doLogin()">Login</button>
        <button class="btn-secondary" onclick="cancelLogin()">Cancel</button>
      </div>
      <p style="font-size:11px; color:var(--color-text-tertiary); margin-top:1rem; text-align:center;">Hint: any password works. Pick a role above.</p>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="pg-main" class="hidden">
  <div class="navbar">
    <div class="navbar-brand"><i class="ti ti-school" aria-hidden="true"></i> ExamSys</div>
    <div class="navbar-right">
      <span id="nav-username"></span>
      <span class="nav-badge" id="nav-role-badge"></span>
      <button class="btn-logout" onclick="doLogout()"><i class="ti ti-logout" aria-hidden="true"></i> Logout</button>
    </div>
  </div>
  <div class="main-layout">
    <div class="sidebar" id="sidebar"></div>
    <div class="content-area" id="content-area"></div>
  </div>
</div>

</div>

<script>
const USERS = { lecturer1:'pass123', student1:'pass123', academic1:'pass123' };
let currentRole = 'lecturer';
let currentUser = '';

const mockQuestions = [
  { id:1, text:'What is the time complexity of binary search?', type:'MCQ', topic:'Data Structures', status:'Approved', options:['O(n)','O(log n)','O(n²)','O(1)'], answer:1 },
  { id:2, text:'Which protocol is used for secure web communication?', type:'MCQ', topic:'Networking', status:'Pending', options:['HTTP','FTP','HTTPS','SMTP'], answer:2 },
  { id:3, text:'Explain the concept of polymorphism in OOP.', type:'Essay', topic:'OOP', status:'Approved', options:[], answer:null },
  { id:4, text:'What does SQL stand for?', type:'MCQ', topic:'Database', status:'Rejected', options:['Structured Query Language','Simple Query Logic','Standard Query Listing','System Query Language'], answer:0 },
];

const mockExams = [
  { id:1, title:'Mid-Term CS101', questions:15, duration:60, status:'Approved', date:'2026-07-10', time:'09:00' },
  { id:2, title:'Final DB202', questions:20, duration:90, status:'Pending', date:'2026-07-15', time:'14:00' },
  { id:3, title:'Quiz NET101', questions:10, duration:30, status:'Scheduled', date:'2026-06-25', time:'10:00' },
];

const mockStudents = [
  { id:'S001', name:'Ahmad Faiz', submitted: true, marks:null },
  { id:'S002', name:'Nurul Ain', submitted: true, marks:null },
  { id:'S003', name:'Khairul Anwar', submitted: false, marks:null },
];

let examState = { currentQ: 0, answers: {}, started: false, warned: false };
let questionForm = { show: false, editing: null };
let scheduleState = { selected: null };
let markState = { selectedExam: null, selectedStudent: null, marks: {} };

function doLogin() {
  const u = document.getElementById('login-user').value;
  const p = document.getElementById('login-pass').value;
  currentRole = document.getElementById('login-role').value;
  if (!u || !p) { showLoginError(); return; }
  currentUser = u;
  document.getElementById('pg-login').classList.add('hidden');
  document.getElementById('pg-main').classList.remove('hidden');
  document.getElementById('nav-username').textContent = u;
  document.getElementById('nav-role-badge').textContent = currentRole === 'lecturer' ? 'Lecturer' : currentRole === 'student' ? 'Student' : 'Academic Affairs';
  buildSidebar();
  renderDashboard();
}

function cancelLogin() {
  document.getElementById('login-user').value = '';
  document.getElementById('login-pass').value = '';
  document.getElementById('login-error').classList.add('hidden');
}

function showLoginError() {
  document.getElementById('login-error').classList.remove('hidden');
  setTimeout(()=>document.getElementById('login-error').classList.add('hidden'), 3000);
}

function doLogout() {
  document.getElementById('pg-main').classList.add('hidden');
  document.getElementById('pg-login').classList.remove('hidden');
  document.getElementById('login-error').classList.add('hidden');
}

const menus = {
  lecturer: [
    { label:'Dashboard', icon:'ti-layout-dashboard', fn:'renderDashboard' },
    { label:'Question Bank', icon:'ti-database', fn:'renderQuestionBank' },
    { label:'Create Exam', icon:'ti-file-plus', fn:'renderCreateExam' },
    { label:'Schedule Exam', icon:'ti-calendar', fn:'renderScheduleExam' },
    { label:'Mark Exam', icon:'ti-pencil-check', fn:'renderMarkExam' },
    { label:'Generate Result', icon:'ti-chart-bar', fn:'renderGenerateResult' },
  ],
  student: [
    { label:'Dashboard', icon:'ti-layout-dashboard', fn:'renderDashboard' },
    { label:'Verify Identity', icon:'ti-face-id', fn:'renderVerifyIdentity' },
    { label:'Take Exam', icon:'ti-writing', fn:'renderTakeExam' },
    { label:'View Result', icon:'ti-certificate', fn:'renderViewResult' },
  ],
  academic: [
    { label:'Dashboard', icon:'ti-layout-dashboard', fn:'renderDashboard' },
    { label:'Review Questions', icon:'ti-eye', fn:'renderReviewExam' },
    { label:'Audit Result', icon:'ti-shield-check', fn:'renderAuditResult' },
  ]
};

function buildSidebar() {
  const sb = document.getElementById('sidebar');
  const items = menus[currentRole];
  sb.innerHTML = `<div class="sidebar-section">Menu</div>` + items.map((m,i)=>
    `<div class="sidebar-item${i===0?' active':''}" onclick="navTo('${m.fn}', this)" id="nav-${m.fn}">
      <i class="ti ${m.icon}" aria-hidden="true"></i>${m.label}
    </div>`
  ).join('');
}

function navTo(fn, el) {
  document.querySelectorAll('.sidebar-item').forEach(x=>x.classList.remove('active'));
  if(el) el.classList.add('active');
  window[fn]();
}

function setActive(fn) {
  document.querySelectorAll('.sidebar-item').forEach(x=>x.classList.remove('active'));
  const el = document.getElementById('nav-'+fn);
  if(el) el.classList.add('active');
}

function ca(html) { document.getElementById('content-area').innerHTML = html; }

function renderDashboard() {
  setActive('renderDashboard');
  if(currentRole==='lecturer') {
    ca(`<div class="page-title"><i class="ti ti-layout-dashboard" aria-hidden="true"></i> Dashboard</div>
    <div class="metrics">
      <div class="metric"><div class="metric-label">Total Questions</div><div class="metric-value">4</div></div>
      <div class="metric"><div class="metric-label">Exams Created</div><div class="metric-value">3</div></div>
      <div class="metric"><div class="metric-label">Pending Review</div><div class="metric-value">1</div></div>
      <div class="metric"><div class="metric-label">Students</div><div class="metric-value">3</div></div>
    </div>
    <div class="card">
      <div class="card-header"><span class="card-title">Recent Exams</span></div>
      <table class="tbl"><thead><tr><th>Title</th><th>Questions</th><th>Duration</th><th>Status</th></tr></thead>
      <tbody>${mockExams.map(e=>`<tr><td>${e.title}</td><td>${e.questions}</td><td>${e.duration} min</td><td><span class="badge ${e.status==='Approved'?'badge-green':e.status==='Scheduled'?'badge-blue':'badge-amber'}">${e.status}</span></td></tr>`).join('')}</tbody></table>
    </div>`);
  } else if(currentRole==='student') {
    ca(`<div class="page-title"><i class="ti ti-layout-dashboard" aria-hidden="true"></i> Dashboard</div>
    <div class="metrics">
      <div class="metric"><div class="metric-label">Upcoming Exams</div><div class="metric-value">2</div></div>
      <div class="metric"><div class="metric-label">Completed</div><div class="metric-value">1</div></div>
      <div class="metric"><div class="metric-label">Identity</div><div class="metric-value" style="font-size:14px; color:#3B6D11;">Verified</div></div>
    </div>
    <div class="card">
      <div class="card-header"><span class="card-title">My Exam Schedule</span></div>
      <table class="tbl"><thead><tr><th>Exam</th><th>Date</th><th>Time</th><th>Duration</th><th>Status</th></tr></thead>
      <tbody>${mockExams.map(e=>`<tr><td>${e.title}</td><td>${e.date}</td><td>${e.time}</td><td>${e.duration} min</td><td><span class="badge badge-blue">${e.status==='Scheduled'?'Upcoming':'Pending'}</span></td></tr>`).join('')}</tbody></table>
    </div>`);
  } else {
    ca(`<div class="page-title"><i class="ti ti-layout-dashboard" aria-hidden="true"></i> Dashboard</div>
    <div class="metrics">
      <div class="metric"><div class="metric-label">Pending Review</div><div class="metric-value">2</div></div>
      <div class="metric"><div class="metric-label">Approved</div><div class="metric-value">1</div></div>
      <div class="metric"><div class="metric-label">Audits Pending</div><div class="metric-value">1</div></div>
    </div>
    <div class="card">
      <div class="card-header"><span class="card-title">Pending Actions</span></div>
      <table class="tbl"><thead><tr><th>Task</th><th>Module</th><th>Priority</th></tr></thead>
      <tbody>
        <tr><td>Review NET101 questions</td><td>Review Exam Questions</td><td><span class="badge badge-red">High</span></td></tr>
        <tr><td>Audit Final DB202 result</td><td>Audit Result</td><td><span class="badge badge-amber">Medium</span></td></tr>
      </tbody></table>
    </div>`);
  }
}

function renderQuestionBank() {
  setActive('renderQuestionBank');
  ca(`<div class="page-title"><i class="ti ti-database" aria-hidden="true"></i> Question Bank</div>
  <div class="card">
    <div class="card-header">
      <span class="card-title">All Questions</span>
      <button class="btn-blue" onclick="showAddQuestion()"><i class="ti ti-plus" aria-hidden="true"></i> Add Question</button>
    </div>
    <table class="tbl"><thead><tr><th>#</th><th>Question</th><th>Type</th><th>Topic</th><th>Status</th><th>Actions</th></tr></thead>
    <tbody>${mockQuestions.map(q=>`<tr>
      <td>${q.id}</td>
      <td style="max-width:200px">${q.text.substring(0,45)}...</td>
      <td>${q.type}</td>
      <td>${q.topic}</td>
      <td><span class="badge ${q.status==='Approved'?'badge-green':q.status==='Pending'?'badge-amber':'badge-red'}">${q.status}</span></td>
      <td style="display:flex;gap:6px">
        <button class="btn-secondary" onclick="editQuestion(${q.id})"><i class="ti ti-edit" aria-hidden="true"></i></button>
        <button class="btn-danger" onclick="deleteQuestion(${q.id})"><i class="ti ti-trash" aria-hidden="true"></i></button>
      </td>
    </tr>`).join('')}</tbody></table>
  </div>
  <div id="q-form-area"></div>`);
}

function showAddQuestion() {
  document.getElementById('q-form-area').innerHTML = `
  <div class="card" style="border:1.5px solid #85B7EB;">
    <div class="card-title" style="margin-bottom:1rem;">Add New Question</div>
    <div class="form-group"><label>Question Text</label><input type="text" id="qtext" placeholder="Enter question..." style="width:100%"/></div>
    <div class="form-group"><label>Topic</label><input type="text" id="qtopic" placeholder="e.g. Data Structures" style="width:100%"/></div>
    <div class="form-group"><label>Type</label><select id="qtype" style="width:100%"><option>MCQ</option><option>Essay</option></select></div>
    <div style="display:flex;gap:8px;margin-top:8px;">
      <button class="btn-blue" onclick="saveQuestion()"><i class="ti ti-device-floppy" aria-hidden="true"></i> Save</button>
      <button class="btn-secondary" onclick="document.getElementById('q-form-area').innerHTML=''">Cancel</button>
    </div>
    <div id="q-save-msg"></div>
  </div>`;
}

function saveQuestion() {
  const t = document.getElementById('qtext').value;
  const topic = document.getElementById('qtopic').value;
  if(!t || !topic) {
    document.getElementById('q-save-msg').innerHTML = '<div class="error-msg" style="margin-top:8px"><i class="ti ti-alert-circle"></i> Incomplete question. Please fill all fields.</div>';
    return;
  }
  mockQuestions.push({ id: mockQuestions.length+1, text:t, type:document.getElementById('qtype').value, topic, status:'Pending', options:[], answer:null });
  document.getElementById('q-form-area').innerHTML = '<div class="success-msg"><i class="ti ti-check"></i> Question saved successfully!</div>';
  setTimeout(renderQuestionBank, 1200);
}

function editQuestion(id) {
  const q = mockQuestions.find(x=>x.id===id);
  document.getElementById('q-form-area').innerHTML = `
  <div class="card" style="border:1.5px solid #85B7EB;">
    <div class="card-title" style="margin-bottom:1rem;">Edit Question #${id}</div>
    <div class="form-group"><label>Question Text</label><input type="text" id="eq-text" value="${q.text}" style="width:100%"/></div>
    <div class="form-group"><label>Topic</label><input type="text" id="eq-topic" value="${q.topic}" style="width:100%"/></div>
    <div style="display:flex;gap:8px;margin-top:8px;">
      <button class="btn-blue" onclick="saveEditQuestion(${id})"><i class="ti ti-device-floppy"></i> Update</button>
      <button class="btn-secondary" onclick="document.getElementById('q-form-area').innerHTML=''">Cancel</button>
    </div>
    <div id="q-save-msg"></div>
  </div>`;
  document.getElementById('q-form-area').scrollIntoView({behavior:'smooth'});
}

function saveEditQuestion(id) {
  const q = mockQuestions.find(x=>x.id===id);
  const t = document.getElementById('eq-text').value;
  const topic = document.getElementById('eq-topic').value;
  if(!t||!topic){ document.getElementById('q-save-msg').innerHTML='<div class="error-msg" style="margin-top:8px"><i class="ti ti-alert-circle"></i> Incomplete question.</div>'; return; }

function saveExam() {
  const t = document.getElementById('ex-title').value;
  if(!t){ document.getElementById('ex-msg').innerHTML='<div class="error-msg"><i class="ti ti-alert-circle"></i> Incomplete structure. Please fill exam title and select questions.</div>'; return; }
  const checked = mockQuestions.filter(q=>{ const el=document.getElementById('sel-q-'+q.id); return el&&el.checked; });
  if(!checked.length){ document.getElementById('ex-msg').innerHTML='<div class="error-msg"><i class="ti ti-alert-circle"></i> Please select at least one question.</div>'; return; }
  mockExams.push({ id:mockExams.length+1, title:t, questions:checked.length, duration:parseInt(document.getElementById('ex-dur').value), status:'Pending', date:'TBD', time:'TBD' });
  document.getElementById('ex-msg').innerHTML='<div class="success-msg"><i class="ti ti-check"></i> Exam created and submitted for review!</div>';
  setTimeout(renderDashboard,1500);
}

function showScheduleForm(id) {

function saveSchedule(id) {
  const d = document.getElementById('sch-date').value;
  const t = document.getElementById('sch-time').value;
  const e = mockExams.find(x=>x.id===id);
  if(d==='2026-07-15'&&e.id===1){ document.getElementById('sch-msg').innerHTML='<div class="error-msg"><i class="ti ti-alert-circle"></i> Conflict detected! Another exam is scheduled at this time.</div>'; return; }

function renderTakeExam() {
  setActive('renderTakeExam');
  examState = { currentQ:0, answers:{}, started:false, warned:false, timeLeft:3600 };
  ca(`<div class="page-title"><i class="ti ti-writing" aria-hidden="true"></i> Take Exam</div>
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;">
      <div><div style="font-size:15px;font-weight:500">Mid-Term CS101</div><div style="font-size:12px;color:var(--color-text-secondary)">10 questions · 60 minutes</div></div>
      <div id="timer-display" style="font-size:16px;font-weight:500;color:#185FA5;background:#E6F1FB;padding:6px 14px;border-radius:var(--border-radius-md)">60:00</div>
    </div>
    <button class="btn-blue" id="start-btn" onclick="startExam()"><i class="ti ti-player-play"></i> Start Examination</button>
  </div>
  <div id="exam-body" class="hidden">

      <div style="margin-bottom:1rem;">

      </div>
      <div id="question-display"></div>
      <div style="display:flex;gap:8px;margin-top:1rem;">
        <button class="btn-secondary" id="btn-prev" onclick="prevQ()"><i class="ti ti-arrow-left"></i> Previous</button>
        <button class="btn-blue" id="btn-next" onclick="nextQ()">Next <i class="ti ti-arrow-right"></i></button>
        <button class="btn-success hidden" id="btn-submit" onclick="submitExam()"><i class="ti ti-check"></i> Submit Exam</button>
      </div>
    </div>
  </div>
  <div id="exam-result" class="hidden"></div>`);
}

function startExam() {
  examState.started = true;
  document.getElementById('start-btn').classList.add('hidden');
  document.getElementById('exam-body').classList.remove('hidden');
  renderQuestion();
  startTimer();
}

let timerInterval;
function startTimer() {
  examState.timeLeft = 3600;
  timerInterval = setInterval(()=>{
    examState.timeLeft--;
    const m = Math.floor(examState.timeLeft/60);
    const s = examState.timeLeft%60;
    const el = document.getElementById('timer-display');
    if(el) el.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    if(examState.timeLeft<=0){ clearInterval(timerInterval); submitExam(); }
  },1000);
}

const examQs = mockQuestions.filter(q=>q.type==='MCQ');
function renderQuestion() {
  const q = examQs[examState.currentQ];
  const nav = document.getElementById('q-nav');
  if(nav) nav.innerHTML = examQs.map((x,i)=>`<button class="q-btn${examState.answers[i]!==undefined?' answered':''}${i===examState.currentQ?' current':''}" onclick="goQ(${i})">${i+1}</button>`).join('');
  const area = document.getElementById('question-display');
  if(!area||!q) return;
  area.innerHTML = `<div style="font-size:14px;font-weight:500;margin-bottom:1rem;">Q${examState.currentQ+1}. ${q.text}</div>
  ${q.options.map((o,i)=>`<div class="option-row${examState.answers[examState.currentQ]===i?' selected':''}" onclick="selectAnswer(${i})">${String.fromCharCode(65+i)}. ${o}</div>`).join('')}`;
  const last = examState.currentQ === examQs.length-1;
  document.getElementById('btn-next').classList.toggle('hidden', last);
  document.getElementById('btn-submit').classList.toggle('hidden', !last);
  document.getElementById('btn-prev').style.opacity = examState.currentQ===0?'0.4':'1';

  if(!examState.warned && examState.currentQ===1) {
    examState.warned = true;
    setTimeout(()=>{
      const area2 = document.getElementById('content-area');
      if(area2){ area2.insertAdjacentHTML('afterbegin','<div class="error-msg" style="margin-bottom:8px"><i class="ti ti-alert-triangle"></i> Warning: Unauthorized activity detected (tab switch). This has been recorded.</div>'); }
    }, 3000);
  }
}

function selectAnswer(i) {
  examState.answers[examState.currentQ] = i;
  renderQuestion();
}

function nextQ() { if(examState.currentQ < examQs.length-1){ examState.currentQ++; renderQuestion(); } }
function prevQ() { if(examState.currentQ > 0){ examState.currentQ--; renderQuestion(); } }
function goQ(i) { examState.currentQ=i; renderQuestion(); }

function submitExam() {
  clearInterval(timerInterval);
  document.getElementById('exam-body').classList.add('hidden');
  const answered = Object.keys(examState.answers).length;
  document.getElementById('exam-result').classList.remove('hidden');
  document.getElementById('exam-result').innerHTML=`
  <div class="card" style="text-align:center;padding:2rem;">
    <i class="ti ti-circle-check" style="font-size:48px;color:#639922;" aria-hidden="true"></i>
    <div style="font-size:18px;font-weight:500;margin:12px 0;">Exam Submitted!</div>
    <p style="color:var(--color-text-secondary);font-size:14px;">You answered ${answered} of ${examQs.length} questions.</p>
    <div class="success-msg" style="margin:1rem auto;max-width:300px;text-align:left;"><i class="ti ti-check"></i> Your answers have been saved successfully.</div>
  </div>`;
}

      <td><button class="btn-blue" onclick="showMarkStudents(${e.id})"><i class="ti ti-pencil-check"></i> Mark</button></td>
    </tr>`).join('')}</tbody></table>
  </div>
  <div id="mark-area"></div>`);
}

function showMarkStudents(examId) {
  document.getElementById('mark-area').innerHTML=`
  <div class="card">
    <div class="card-header"><span class="card-title">Student Submissions</span></div>
    <table class="tbl"><thead><tr><th>Student ID</th><th>Name</th><th>Submitted</th><th>Action</th></tr></thead>
    <tbody>${mockStudents.map(s=>`<tr>
      <td>${s.id}</td><td>${s.name}</td>
      <td>${s.submitted?'<span class="badge badge-green">Yes</span>':'<span class="badge badge-gray">No</span>'}</td>
      <td>${s.submitted?`<button class="btn-blue" onclick="markStudent('${s.id}',${examId})"><i class="ti ti-pencil"></i> Mark</button>`:'-'}</td>
    </tr>`).join('')}</tbody></table>
  </div>
  <div id="mark-student-area"></div>`;
}

function markStudent(sid, examId) {
  const s = mockStudents.find(x=>x.id===sid);
  document.getElementById('mark-student-area').innerHTML=`
  <div class="card" style="border:1.5px solid #85B7EB;">
    <div class="card-title" style="margin-bottom:1rem;">Marking: ${s.name}</div>
    ${examQs.map((q,i)=>`
    <div style="padding:10px;border-bottom:0.5px solid var(--color-border-tertiary);">
      <div style="font-size:13px;margin-bottom:6px;">Q${i+1}. ${q.text}</div>
      <div style="font-size:12px;color:var(--color-text-secondary);">Student answer: <b>${q.options[examState.answers[i]!==undefined?examState.answers[i]:0]||'—'}</b> | Correct: <b>${q.options[q.answer]}</b></div>
      <div style="display:flex;align-items:center;gap:8px;margin-top:4px;">
        <label style="font-size:12px">Marks:</label>
        <input type="number" id="mark-q-${i}" value="${examState.answers[i]===q.answer?1:0}" min="0" max="1" style="width:60px"/>
      </div>
    </div>`).join('')}
    <div style="display:flex;gap:8px;margin-top:1rem;">
      <button class="btn-blue" onclick="submitMarks('${sid}')"><i class="ti ti-check"></i> Submit Final Mark</button>
      <button class="btn-secondary" onclick="document.getElementById('mark-student-area').innerHTML=''">Cancel</button>
    </div>
    <div id="mark-msg"></div>
  </div>`;
}

function submitMarks(sid) {
  const total = examQs.reduce((sum,q,i)=>{ const el=document.getElementById('mark-q-'+i); return sum+(el?parseInt(el.value)||0:0); },0);
  const s = mockStudents.find(x=>x.id===sid);
  s.marks = total;
  document.getElementById('mark-msg').innerHTML=`<div class="success-msg" style="margin-top:8px"><i class="ti ti-check"></i> Marks submitted for ${s.name}: ${total}/${examQs.length}</div>`;
}

function renderGenerateResult() {
  setActive('renderGenerateResult');
  ca(`<div class="page-title"><i class="ti ti-chart-bar" aria-hidden="true"></i> Generate Result</div>
  <div class="card">
    <div class="card-header"><span class="card-title">Student Marks Summary</span></div>
    <table class="tbl"><thead><tr><th>Student</th><th>Marks</th><th>Percentage</th><th>Grade</th></tr></thead>

}

  document.getElementById('gen-msg').innerHTML='<div class="success-msg"><i class="ti ti-check"></i> Final exam results generated and saved successfully!</div>';
